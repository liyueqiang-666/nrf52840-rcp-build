name: Build ARM64 chip-tool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: ghcr.io/project-chip/chip-build-crosscompile:181
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare directories
        run: |
          set -euxo pipefail
          mkdir -p /tmp/matter-build
          mkdir -p "$GITHUB_WORKSPACE/out"
          git config --global --add safe.directory '*'

      - name: Clone Matter SDK
        run: |
          set -euxo pipefail
          cd /tmp/matter-build
          git clone --depth 1 https://github.com/project-chip/connectedhomeip.git
          cd connectedhomeip
          ./scripts/checkout_submodules.py --shallow --platform linux

      - name: Build chip-tool for Raspberry Pi arm64
        run: |
          set -euxo pipefail
          cd /tmp/matter-build/connectedhomeip
          source scripts/activate.sh
          ./scripts/build/build_examples.py --target linux-arm64-chip-tool-clang build

      - name: Collect chip-tool
        run: |
          set -euxo pipefail
          cd /tmp/matter-build/connectedhomeip
          find build -name chip-tool -type f -print
          CHIP_TOOL=$(find build -name chip-tool -type f | head -n 1)

          if [ -z "$CHIP_TOOL" ]; then
            echo "chip-tool not found"
            exit 1
          fi

          cp "$CHIP_TOOL" "$GITHUB_WORKSPACE/out/chip-tool"
          chmod +x "$GITHUB_WORKSPACE/out/chip-tool"
          ls -lh "$GITHUB_WORKSPACE/out/chip-tool"

      - name: Upload chip-tool
        uses: actions/upload-artifact@v4
        with:
          name: chip-tool-arm64
          path: out/chip-tool
