name: Build nRF52840 Dongle OpenThread RCP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v2.9.3
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare workspace
        run: |
          set -euxo pipefail

          git config --global --add safe.directory '*'

          mkdir -p /work/ncs
          cd /work/ncs

          git clone --depth 1 --branch v2.9.3 https://github.com/nrfconnect/sdk-nrf.git nrf

          west init -l nrf
          west update --narrow -o=--depth=1
          west zephyr-export

          python3 -m pip install --upgrade pip
          python3 -m pip install -r zephyr/scripts/requirements.txt
          python3 -m pip install -r nrf/scripts/requirements.txt
          python3 -m pip install -r bootloader/mcuboot/scripts/requirements.txt

      - name: Build nRF52840 Dongle RCP firmware
        run: |
          set -euxo pipefail

          cd /work/ncs

          west build -p always \
            -b nrf52840dongle/nrf52840 \
            nrf/samples/openthread/coprocessor/

      - name: Show build output
        run: |
          set -euxo pipefail

          cd /work/ncs

          ls -lh build/zephyr || true
          ls -lh build/zephyr/zephyr.hex || true
          ls -lh build/zephyr/zephyr.zip || true

      - name: Create DFU ZIP if not generated
        run: |
          set -euxo pipefail

          cd /work/ncs

          if [ ! -f build/zephyr/zephyr.zip ]; then
            nrfutil install nrf5sdk-tools || true
            nrfutil nrf5sdk-tools pkg generate \
              --hw-version 52 \
              --sd-req 0x00 \
              --application build/zephyr/zephyr.hex \
              --application-version 10 \
              build/zephyr/zephyr.zip
          fi

          ls -lh build/zephyr/zephyr.zip

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: nrf52840dongle-rcp-firmware
          path: |
            /work/ncs/build/zephyr/zephyr.hex
            /work/ncs/build/zephyr/zephyr.zip
            /work/ncs/build/zephyr/merged.hex
