name: Build nRF52840 Dongle OpenThread RCP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v2.9.3
      options: --user root

    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare workspace
        run: |
          set -euxo pipefail

          git config --global --add safe.directory '*'

          mkdir -p /work/ncs
          cd /work/ncs

          git clone --depth 1 --branch v2.9.3 https://github.com/nrfconnect/sdk-nrf.git nrf

          west init -l nrf
          west update --narrow -o=--depth=1
          west zephyr-export

          python3 -m pip install --upgrade pip
          python3 -m pip install -r zephyr/scripts/requirements.txt
          python3 -m pip install -r nrf/scripts/requirements.txt
          python3 -m pip install -r bootloader/mcuboot/scripts/requirements.txt

      - name: Build RCP firmware
        run: |
          set -euxo pipefail

          cd /work/ncs

          west build -p always \
            -b nrf52840dongle_nrf52840 \
            nrf/samples/openthread/coprocessor/ \
            -- \
            -DCONFIG_BUILD_OUTPUT_HEX=y

      - name: Find firmware output
        run: |
          set -euxo pipefail

          cd /work/ncs

          echo "=== Find all HEX files ==="
          find build -name "*.hex" -type f -print

          mkdir -p /work/out

          if [ -f build/zephyr/zephyr.hex ]; then
            cp build/zephyr/zephyr.hex /work/out/zephyr.hex
          elif [ -f build/zephyr/merged.hex ]; then
            cp build/zephyr/merged.hex /work/out/zephyr.hex
          else
            HEX_FILE=$(find build -name "zephyr.hex" -type f | head -n 1)
            if [ -z "$HEX_FILE" ]; then
              HEX_FILE=$(find build -name "merged.hex" -type f | head -n 1)
            fi

            if [ -z "$HEX_FILE" ]; then
              echo "No zephyr.hex or merged.hex found"
              exit 1
            fi

            echo "Using HEX file: $HEX_FILE"
            cp "$HEX_FILE" /work/out/zephyr.hex
          fi

          ls -lh /work/out/zephyr.hex
          head -n 3 /work/out/zephyr.hex

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: nrf52840dongle-rcp-firmware
          path: |
            /work/out/zephyr.hex
