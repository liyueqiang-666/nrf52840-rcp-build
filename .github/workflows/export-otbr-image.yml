name: Export OTBR Docker Image

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-22.04

    steps:
      - name: Pull ARM64 OTBR image
        run: |
          docker pull --platform linux/arm64 openthread/border-router:latest
          docker images openthread/border-router:latest

      - name: Save ARM64 image
        run: |
          docker save openthread/border-router:latest | gzip > otbr-image-arm64.tar.gz
          ls -lh otbr-image-arm64.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: otbr-image-arm64
          path: otbr-image-arm64.tar.gz
